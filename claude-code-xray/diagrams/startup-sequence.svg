<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 350" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="timeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#667eea"/>
            <stop offset="100%" style="stop-color:#764ba2"/>
        </linearGradient>
        <linearGradient id="phaseGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#f093fb"/>
            <stop offset="100%" style="stop-color:#f5576c"/>
        </linearGradient>
        <linearGradient id="phaseGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4facfe"/>
            <stop offset="100%" style="stop-color:#00f2fe"/>
        </linearGradient>
        <linearGradient id="phaseGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#43e97b"/>
            <stop offset="100%" style="stop-color:#38f9d7"/>
        </linearGradient>
        <linearGradient id="phaseGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#fa709a"/>
            <stop offset="100%" style="stop-color:#fee140"/>
        </linearGradient>
        <linearGradient id="phaseGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10ac84"/>
            <stop offset="100%" style="stop-color:#1dd1a1"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.3"/>
        </filter>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
        </marker>
    </defs>
    
    <!-- Title -->
    <text x="600" y="35" text-anchor="middle" fill="#333" font-size="20" font-weight="bold">Startup Sequence with Prefetch Optimization</text>
    
    <!-- Timeline -->
    <rect x="50" y="55" width="1100" height="25" rx="12" fill="url(#timeGrad)"/>
    <text x="100" y="72" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">T+0ms</text>
    <text x="350" y="72" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">T+135ms</text>
    <text x="600" y="72" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">T+300ms</text>
    <text x="850" y="72" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">T+450ms</text>
    <text x="1070" y="72" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">T+500ms</text>
    
    <!-- Phase 1 -->
    <g filter="url(#shadow)">
        <rect x="50" y="100" width="130" height="80" rx="12" fill="url(#phaseGrad1)"/>
        <text x="115" y="125" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Phase 1</text>
        <text x="115" y="145" text-anchor="middle" fill="#fff" font-size="10">Entry Point</text>
        <text x="115" y="165" text-anchor="middle" fill="#fff" font-size="9">(main.tsx)</text>
    </g>
    
    <!-- Parallel operations box -->
    <rect x="190" y="100" width="250" height="80" rx="12" fill="#e3f2fd" stroke="#4facfe" stroke-width="2"/>
    <text x="315" y="120" text-anchor="middle" fill="#01579b" font-size="13" font-weight="bold">PARALLEL (135ms)</text>
    <text x="315" y="140" text-anchor="middle" fill="#0277bd" font-size="10">MDM Read + Keychain Prefetch + Module Imports</text>
    <text x="315" y="158" text-anchor="middle" fill="#0277bd" font-size="9">All running concurrently</text>
    
    <!-- Arrow -->
    <path d="M450 140 L510 140" stroke="#667eea" stroke-width="4" marker-end="url(#arrowhead)"/>
    
    <!-- Phase 2 -->
    <g filter="url(#shadow)">
        <rect x="520" y="100" width="130" height="80" rx="12" fill="url(#phaseGrad2)"/>
        <text x="585" y="125" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Phase 2</text>
        <text x="585" y="145" text-anchor="middle" fill="#fff" font-size="10">Config Loading</text>
        <text x="585" y="165" text-anchor="middle" fill="#fff" font-size="9">+ Auth Setup</text>
    </g>
    
    <!-- Arrow -->
    <path d="M660 140 L720 140" stroke="#4facfe" stroke-width="4" marker-end="url(#arrowhead)"/>
    
    <!-- Phase 3 -->
    <g filter="url(#shadow)">
        <rect x="730" y="100" width="130" height="80" rx="12" fill="url(#phaseGrad3)"/>
        <text x="795" y="125" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Phase 3</text>
        <text x="795" y="145" text-anchor="middle" fill="#fff" font-size="10">MCP Servers</text>
        <text x="795" y="165" text-anchor="middle" fill="#fff" font-size="9">Connect</text>
    </g>
    
    <!-- Arrow -->
    <path d="M870 140 L930 140" stroke="#43e97b" stroke-width="4" marker-end="url(#arrowhead)"/>
    
    <!-- Phase 4 -->
    <g filter="url(#shadow)">
        <rect x="940" y="100" width="130" height="80" rx="12" fill="url(#phaseGrad4)"/>
        <text x="1005" y="125" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Phase 4</text>
        <text x="1005" y="145" text-anchor="middle" fill="#fff" font-size="10">State Init</text>
        <text x="1005" y="165" text-anchor="middle" fill="#fff" font-size="9">+ Store Setup</text>
    </g>
    
    <!-- Arrow -->
    <path d="M1080 140 L1100 140" stroke="#fa709a" stroke-width="4" marker-end="url(#arrowhead)"/>
    
    <!-- Phase 5 -->
    <g filter="url(#shadow)">
        <rect x="1020" y="100" width="130" height="80" rx="12" fill="url(#phaseGrad5)"/>
        <text x="1085" y="125" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Phase 5</text>
        <text x="1085" y="145" text-anchor="middle" fill="#fff" font-size="10">REPL Launch</text>
        <text x="1085" y="165" text-anchor="middle" fill="#fff" font-size="9">Ready!</text>
    </g>
    
    <!-- Key Insight Box -->
    <g transform="translate(50, 200)">
        <rect x="0" y="0" width="1100" height="130" rx="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
        <text x="550" y="30" text-anchor="middle" fill="#e65100" font-size="16" font-weight="bold">Key Optimization: I/O Before Imports!</text>
        
        <text x="30" y="55" fill="#333" font-size="13">The secret to Claude Code's fast startup:</text>
        
        <rect x="30" y="70" width="320" height="50" rx="10" fill="#ffebee"/>
        <text x="45" y="90" fill="#c62828" font-size="12" font-weight="bold">Without Prefetch:</text>
        <text x="45" y="108" fill="#666" font-size="11">1. Load modules (135ms) 2. Read keychain (65ms)</text>
        <text x="260" y="108" fill="#c62828" font-size="11" font-weight="bold">= 200ms total</text>
        
        <rect x="370" y="70" width="350" height="50" rx="10" fill="#e8f5e9"/>
        <text x="385" y="90" fill="#2e7d32" font-size="12" font-weight="bold">With Prefetch:</text>
        <text x="385" y="108" fill="#666" font-size="11">Start keychain + modules in parallel</text>
        <text x="630" y="108" fill="#2e7d32" font-size="11" font-weight="bold">= 135ms total!</text>
        
        <rect x="740" y="70" width="320" height="50" rx="10" fill="#e3f2fd"/>
        <text x="755" y="90" fill="#01579b" font-size="12" font-weight="bold">Code Example:</text>
        <text x="755" y="108" fill="#667eea" font-size="11">startMdmRawRead()</text>
        <text x="900" y="108" fill="#667eea" font-size="11">startKeychainPrefetch()</text>
        <text x="1000" y="108" fill="#666" font-size="9">(before imports)</text>
    </g>
</svg>
