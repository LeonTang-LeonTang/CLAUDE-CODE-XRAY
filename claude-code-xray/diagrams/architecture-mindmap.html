<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Architecture Mind Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .mindmap {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow-x: auto;
        }
        .mindmap h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        svg {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 0.9rem;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Claude Code Architecture Mind Map</h1>
        
        <div class="mindmap">
            <h2>📊 High-Level Architecture Overview</h2>
            <svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
                <!-- Background -->
                <defs>
                    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#667eea"/>
                        <stop offset="100%" style="stop-color:#764ba2"/>
                    </linearGradient>
                    <linearGradient id="cliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#f093fb"/>
                        <stop offset="100%" style="stop-color:#f5576c"/>
                    </linearGradient>
                    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#4facfe"/>
                        <stop offset="100%" style="stop-color:#00f2fe"/>
                    </linearGradient>
                    <linearGradient id="queryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#43e97b"/>
                        <stop offset="100%" style="stop-color:#38f9d7"/>
                    </linearGradient>
                    <linearGradient id="toolsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#fa709a"/>
                        <stop offset="100%" style="stop-color:#fee140"/>
                    </linearGradient>
                    <linearGradient id="stateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#a8edea"/>
                        <stop offset="100%" style="stop-color:#fed6e3"/>
                    </linearGradient>
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.3"/>
                    </filter>
                </defs>
                
                <!-- Central Node: Claude Code -->
                <g filter="url(#shadow)">
                    <circle cx="800" cy="500" r="80" fill="url(#centerGrad)"/>
                    <text x="800" y="490" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Claude Code</text>
                    <text x="800" y="515" text-anchor="middle" fill="#fff" font-size="12">5-Layer Architecture</text>
                </g>
                
                <!-- Layer 1: CLI Layer -->
                <g filter="url(#shadow)">
                    <rect x="50" y="50" width="200" height="120" rx="15" fill="url(#cliGrad)"/>
                    <text x="150" y="85" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">CLI Layer</text>
                    <text x="150" y="110" text-anchor="middle" fill="#fff" font-size="11">main.tsx ~4600 lines</text>
                </g>
                <path d="M250 110 Q400 200 720 480" stroke="#f093fb" stroke-width="3" fill="none" marker-end="url(#arrowPink)"/>
                
                <!-- CLI Sub-components -->
                <g>
                    <rect x="20" y="180" width="120" height="50" rx="10" fill="#fce4ec"/>
                    <text x="80" y="205" text-anchor="middle" fill="#c2185b" font-size="11">Commands</text>
                    <text x="80" y="220" text-anchor="middle" fill="#c2185b" font-size="10">(100+)</text>
                    
                    <rect x="160" y="180" width="120" height="50" rx="10" fill="#fce4ec"/>
                    <text x="220" y="205" text-anchor="middle" fill="#c2185b" font-size="11">REPL Launcher</text>
                    
                    <rect x="20" y="250" width="120" height="50" rx="10" fill="#fce4ec"/>
                    <text x="80" y="275" text-anchor="middle" fill="#c2185b" font-size="11">Terminal</text>
                    <text x="80" y="290" text-anchor="middle" fill="#c2185b" font-size="10">Renderer</text>
                    
                    <rect x="160" y="250" width="120" height="50" rx="10" fill="#fce4ec"/>
                    <text x="220" y="275" text-anchor="middle" fill="#c2185b" font-size="11">Argument Parser</text>
                </g>
                
                <!-- Layer 2: Bridge Layer -->
                <g filter="url(#shadow)">
                    <rect x="50" y="380" width="200" height="120" rx="15" fill="url(#bridgeGrad)"/>
                    <text x="150" y="415" text-anchor="middle" fill="#01579b" font-size="16" font-weight="bold">Bridge Layer</text>
                    <text x="150" y="440" text-anchor="middle" fill="#01579b" font-size="11">bridgeMain.ts ~3000</text>
                </g>
                <path d="M250 440 Q400 400 720 480" stroke="#4facfe" stroke-width="3" fill="none"/>
                
                <!-- Bridge Sub-components -->
                <g>
                    <rect x="20" y="510" width="120" height="50" rx="10" fill="#e1f5fe"/>
                    <text x="80" y="535" text-anchor="middle" fill="#0277bd" font-size="11">Remote Bridge</text>
                    
                    <rect x="160" y="510" width="120" height="50" rx="10" fill="#e1f5fe"/>
                    <text x="220" y="535" text-anchor="middle" fill="#0277bd" font-size="11">Session Runner</text>
                    
                    <rect x="20" y="580" width="120" height="50" rx="10" fill="#e1f5fe"/>
                    <text x="80" y="605" text-anchor="middle" fill="#0277bd" font-size="11">Permission</text>
                    <text x="80" y="620" text-anchor="middle" fill="#0277bd" font-size="10">Callbacks</text>
                    
                    <rect x="160" y="580" width="120" height="50" rx="10" fill="#e1f5fe"/>
                    <text x="220" y="605" text-anchor="middle" fill="#0277bd" font-size="11">Transport</text>
                    <text x="220" y="620" text-anchor="middle" fill="#0277bd" font-size="10">WS/HTTP/stdio</text>
                </g>
                
                <!-- Layer 3: Query Engine -->
                <g filter="url(#shadow)">
                    <rect x="1300" y="50" width="250" height="120" rx="15" fill="url(#queryGrad)"/>
                    <text x="1425" y="85" text-anchor="middle" fill="#1b5e20" font-size="16" font-weight="bold">Query Engine</text>
                    <text x="1425" y="110" text-anchor="middle" fill="#1b5e20" font-size="11">query.ts ~1700 + QueryEngine.ts ~1200</text>
                </g>
                <path d="M1300 110 Q1100 200 880 480" stroke="#43e97b" stroke-width="3" fill="none"/>
                
                <!-- Query Sub-components -->
                <g>
                    <rect x="1380" y="180" width="130" height="50" rx="10" fill="#e8f5e9"/>
                    <text x="1445" y="205" text-anchor="middle" fill="#2e7d32" font-size="11">Message Pipeline</text>
                    
                    <rect x="1380" y="250" width="130" height="50" rx="10" fill="#e8f5e9"/>
                    <text x="1445" y="275" text-anchor="middle" fill="#2e7d32" font-size="11">Context Builder</text>
                    
                    <rect x="1380" y="320" width="130" height="50" rx="10" fill="#e8f5e9"/>
                    <text x="1445" y="345" text-anchor="middle" fill="#2e7d32" font-size="11">Tool Use Loop</text>
                    
                    <rect x="1380" y="390" width="130" height="50" rx="10" fill="#e8f5e9"/>
                    <text x="1445" y="415" text-anchor="middle" fill="#2e7d32" font-size="11">Streaming Handler</text>
                    
                    <rect x="1380" y="460" width="130" height="50" rx="10" fill="#e8f5e9"/>
                    <text x="1445" y="485" text-anchor="middle" fill="#2e7d32" font-size="11">Compaction System</text>
                </g>
                
                <!-- Layer 4: Tool System -->
                <g filter="url(#shadow)">
                    <rect x="1300" y="580" width="250" height="120" rx="15" fill="url(#toolsGrad)"/>
                    <text x="1425" y="615" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">Tool System</text>
                    <text x="1425" y="640" text-anchor="middle" fill="#fff" font-size="11">tools.ts + toolOrchestration.ts</text>
                </g>
                <path d="M1300 640 Q1100 600 880 520" stroke="#fa709a" stroke-width="3" fill="none"/>
                
                <!-- Tool Sub-components -->
                <g>
                    <rect x="1380" y="720" width="120" height="50" rx="10" fill="#fff3e0"/>
                    <text x="1440" y="745" text-anchor="middle" fill="#e65100" font-size="10">File Tools</text>
                    
                    <rect x="1380" y="780" width="120" height="50" rx="10" fill="#fff3e0"/>
                    <text x="1440" y="805" text-anchor="middle" fill="#e65100" font-size="10">Shell Tools</text>
                    
                    <rect x="1380" y="840" width="120" height="50" rx="10" fill="#fff3e0"/>
                    <text x="1440" y="865" text-anchor="middle" fill="#e65100" font-size="10">Web Tools</text>
                    
                    <rect x="1210" y="720" width="150" height="50" rx="10" fill="#fff3e0"/>
                    <text x="1285" y="745" text-anchor="middle" fill="#e65100" font-size="10">Agent Tools</text>
                    
                    <rect x="1210" y="780" width="150" height="50" rx="10" fill="#fff3e0"/>
                    <text x="1285" y="805" text-anchor="middle" fill="#e65100" font-size="10">MCP Tools</text>
                    
                    <rect x="1210" y="840" width="150" height="50" rx="10" fill="#fff3e0"/>
                    <text x="1285" y="865" text-anchor="middle" fill="#e65100" font-size="10">Special Tools</text>
                </g>
                
                <!-- Layer 5: State Layer -->
                <g filter="url(#shadow)">
                    <rect x="50" y="700" width="200" height="120" rx="15" fill="url(#stateGrad)"/>
                    <text x="150" y="735" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">State Layer</text>
                    <text x="150" y="760" text-anchor="middle" fill="#333" font-size="11">AppState.tsx + store.ts</text>
                </g>
                <path d="M250 760 Q400 700 720 520" stroke="#a8edea" stroke-width="3" fill="none"/>
                
                <!-- State Sub-components -->
                <g>
                    <rect x="20" y="830" width="100" height="50" rx="10" fill="#f3e5f5"/>
                    <text x="70" y="855" text-anchor="middle" fill="#7b1fa2" font-size="10">AppState</text>
                    
                    <rect x="140" y="830" width="100" height="50" rx="10" fill="#f3e5f5"/>
                    <text x="190" y="855" text-anchor="middle" fill="#7b1fa2" font-size="10">Store</text>
                    
                    <rect x="20" y="890" width="100" height="50" rx="10" fill="#f3e5f5"/>
                    <text x="70" y="915" text-anchor="middle" fill="#7b1fa2" font-size="10">Hooks (88+)</text>
                    
                    <rect x="140" y="890" width="100" height="50" rx="10" fill="#f3e5f5"/>
                    <text x="190" y="915" text-anchor="middle" fill="#7b1fa2" font-size="10">Permissions</text>
                </g>
                
                <!-- External APIs -->
                <g filter="url(#shadow)">
                    <rect x="350" y="200" width="150" height="70" rx="12" fill="#5c6bc0"/>
                    <text x="425" y="230" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Anthropic API</text>
                    <text x="425" y="250" text-anchor="middle" fill="#fff" font-size="10">claude.ai API</text>
                </g>
                
                <g filter="url(#shadow)">
                    <rect x="350" y="300" width="150" height="70" rx="12" fill="#26a69a"/>
                    <text x="425" y="330" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">MCP Servers</text>
                    <text x="425" y="350" text-anchor="middle" fill="#fff" font-size="10">External Tools</text>
                </g>
                
                <!-- Legend -->
                <g transform="translate(600, 920)">
                    <text x="0" y="0" fill="#999" font-size="12">Legend:</text>
                    <rect x="80" y="-12" width="15" height="15" fill="url(#cliGrad)" rx="3"/>
                    <text x="100" y="0" fill="#999" font-size="11">CLI</text>
                    <rect x="140" y="-12" width="15" height="15" fill="url(#bridgeGrad)" rx="3"/>
                    <text x="160" y="0" fill="#999" font-size="11">Bridge</text>
                    <rect x="210" y="-12" width="15" height="15" fill="url(#queryGrad)" rx="3"/>
                    <text x="230" y="0" fill="#999" font-size="11">Query</text>
                    <rect x="280" y="-12" width="15" height="15" fill="url(#toolsGrad)" rx="3"/>
                    <text x="300" y="0" fill="#999" font-size="11">Tools</text>
                    <rect x="350" y="-12" width="15" height="15" fill="url(#stateGrad)" rx="3"/>
                    <text x="370" y="0" fill="#999" font-size="11">State</text>
                </g>
            </svg>
        </div>
        
        <div class="mindmap">
            <h2>⚡ Tool Execution Pipeline</h2>
            <svg viewBox="0 0 1400 600" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="detectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ff6b6b"/>
                        <stop offset="100%" style="stop-color:#feca57"/>
                    </linearGradient>
                    <linearGradient id="permGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#5f27cd"/>
                        <stop offset="100%" style="stop-color:#a55eea"/>
                    </linearGradient>
                    <linearGradient id="execGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#00d2d3"/>
                        <stop offset="100%" style="stop-color:#54a0ff"/>
                    </linearGradient>
                    <linearGradient id="resultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#10ac84"/>
                        <stop offset="100%" style="stop-color:#1dd1a1"/>
                    </linearGradient>
                </defs>
                
                <!-- Step 1: Detection -->
                <g filter="url(#shadow)">
                    <rect x="30" y="50" width="200" height="200" rx="20" fill="url(#detectGrad)"/>
                    <text x="130" y="85" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">1. DETECTION</text>
                    
                    <rect x="50" y="110" width="160" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>

                    <rect x="50" y="160" width="160" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="130" y="185" text-anchor="middle" fill="#fff" font-size="12">Parse Event</text>
                    
                    <rect x="50" y="210" width="160" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="130" y="235" text-anchor="middle" fill="#fff" font-size="12">ToolUseBlock</text>
                </g>
                
                <!-- Arrow 1 -->
                <path d="M240 150 L320 150" stroke="#ff6b6b" stroke-width="4" marker-end="url(#arrowhead)"/>
                
                <!-- Step 2: Permission -->
                <g filter="url(#shadow)">
                    <rect x="330" y="50" width="200" height="200" rx="20" fill="url(#permGrad)"/>
                    <text x="430" y="85" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">2. PERMISSION</text>
                    
                    <rect x="350" y="110" width="160" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="430" y="135" text-anchor="middle" fill="#fff" font-size="12">Check canUseTool()</text>
                    
                    <rect x="350" y="160" width="160" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="430" y="185" text-anchor="middle" fill="#fff" font-size="12">Permission State</text>
                    
                    <rect x="350" y="210" width="160" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="430" y="235" text-anchor="middle" fill="#fff" font-size="12">User Approval?</text>
                </g>
                
                <!-- Permission branches -->
                <path d="M530 200 L580 200" stroke="#5f27cd" stroke-width="3"/>
                <text x="545" y="190" fill="#5f27cd" font-size="10">No</text>
                <rect x="590" y="175" width="100" height="50" rx="10" fill="#e74c3c"/>
                <text x="640" y="205" text-anchor="middle" fill="#fff" font-size="11">Error</text>
                
                <path d="M430 260 L430 320" stroke="#5f27cd" stroke-width="3"/>
                <text x="445" y="290" fill="#5f27cd" font-size="10">Yes</text>
                
                <!-- Arrow 2 -->

                <!-- Step 3: Execution -->

                    <rect x="630" y="50" width="200" height="200" rx="20" fill="url(#execGrad)"/>
                    <text x="730" y="85" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">3. EXECUTION</text>
                    
                    <rect x="650" y="110" width="160" height="35" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="730" y="133" text-anchor="middle" fill="#fff" font-size="11">findTool()</text>
                    
                    <rect x="650" y="150" width="160" height="35" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="730" y="173" text-anchor="middle" fill="#fff" font-size="11">Partition Safety</text>
                    
                    <rect x="650" y="185" width="75" height="35" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="687" y="208" text-anchor="middle" fill="#fff" font-size="10">Parallel</text>
                    
                    <rect x="735" y="185" width="75" height="35" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="772" y="208" text-anchor="middle" fill="#fff" font-size="10">Serial</text>
                </g>
                
                <!-- Arrow 3 -->
                <path d="M840 150 L920 150" stroke="#00d2d3" stroke-width="4"/>
                
                <!-- Step 4: Result -->
                <g filter="url(#shadow)">
                    <rect x="930" y="50" width="200" height="200" rx="20" fill="url(#resultGrad)"/>
                    <text x="1030" y="85" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">4. RESULT</text>
                    
                    <rect x="950" y="110" width="160" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="1030" y="135" text-anchor="middle" fill="#fff" font-size="12">Format Result</text>
                    
                    <rect x="950" y="160" width="160" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="1030" y="185" text-anchor="middle" fill="#fff" font-size="12">Add to Messages</text>
                    
                    <rect x="950" y="210" width="160" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <text x="1030" y="235" text-anchor="middle" fill="#fff" font-size="12">Loop or Exit</text>
                </g>
                
                <!-- Loop back arrow -->
                <path d="M1030 260 L1030 350 L130 350 L130 260" stroke="#10ac84" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
                <text x="580" y="370" text-anchor="middle" fill="#10ac84" font-size="14" font-weight="bold">Loop: More Tools?</text>

                    <text x="0" y="30" fill="#333" font-size="14" font-weight="bold">Read-Only Tools (Parallel):</text>

                    <rect x="110" y="45" width="80" height="35" rx="8" fill="#e8f5e9"/>

                    <rect x="200" y="45" width="80" height="35" rx="8" fill="#e8f5e9"/>
                    <text x="240" y="68" text-anchor="middle" fill="#2e7d32" font-size="11">GrepTool</text>

                    <text x="270" y="158" text-anchor="middle" fill="#c62828" font-size="11">FileEditTool</text>
                </g>
            </svg>
        </div>
        
        <div class="mindmap">
            <h2>🔄 Request-Response Flow</h2>
            <svg viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="flowGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#667eea"/>
                        <stop offset="100%" style="stop-color:#764ba2"/>
                    </linearGradient>
                </defs>
                
                <!-- Flow Steps -->
                <g filter="url(#shadow)">
                    <circle cx="75" cy="250" r="50" fill="url(#flowGrad1)"/>
                    <text x="75" y="245" text-anchor="middle" fill="#fff" font-size="24">1</text>
                    <text x="75" y="315" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">User Input</text>
                </g>
                
                <path d="M130 250 L180 250" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
                
                <g filter="url(#shadow)">
                    <circle cx="230" cy="250" r="50" fill="url(#flowGrad1)"/>
                    <text x="230" y="245" text-anchor="middle" fill="#fff" font-size="24">2</text>
                    <text x="230" y="315" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Process Input</text>
                </g>
                
                <path d="M285 250 L335 250" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
